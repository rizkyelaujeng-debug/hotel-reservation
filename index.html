<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Savora Hotel & Resto</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <h1>Grand Savora Hotel & Resto</h1>

    <div class="container">

        <div class="form-card">
            <h2>Book Room</h2>

            <div id="roomPreviewContainer" class="preview-container">
                <img id="roomPreview" src="./img/standard.jpg" alt="Room Preview">
            </div>

            <div class="form-group">
                <input type="text" id="customerName" placeholder="Customer Name">
                <input type="text" id="customerPhone" placeholder="Phone Number">
            </div>

            <div class="form-group">
                <input type="number" id="customerPoints" placeholder="Points">
                <input type="number" id="roomNumber" placeholder="Room Number">
            </div>

            <div class="form-group">
                <select id="roomType">
                    <option value="Standard">Standard Room</option>
                    <option value="Deluxe">Deluxe Room</option>
                    <option value="Suite">Suite Room</option>
                </select>
                <input type="text" id="roomPrice" placeholder="Room Price" readonly>
            </div>
            
            <input type="number" id="days" placeholder="How many days of stay">

            <button id="bookBtn">
                Book Now
            </button>
        </div>

        <div class="form-card" style="border-top: 3px solid #10b981;">
            <h2>In-Room Dining Experience</h2>

            <div id="foodPreviewContainer" class="preview-container">
                <img id="foodPreview" src="./img/dininginexp.jpg" alt="In Room Dining Experience">
            </div>

            <select id="selectCustomerOrder">
                <option value="">-- Select Customer / Room --</option>
            </select>

            <div class="form-group">
                <select id="foodMenu">
                    <option value="">-- Select Menu Item --</option>
                </select>
                <input type="text" id="foodPrice" placeholder="Food Price" readonly>
            </div>
            
            <input type="number" id="foodQty" placeholder="Quantity">

            <button id="orderFoodBtn">
                Add to Order
            </button>
        </div>

        <div id="output"></div>

    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
